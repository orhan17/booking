services:
  api:
    build: .
    image: booking-aggregator:latest
    ports:
      # Override the host port with HOST_PORT=... if 8080 is taken.
      - "${HOST_PORT:-8080}:8080"
    environment:
      ADDR: ":8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 2s
    restart: unless-stopped
